<!DOCTYPE html>
 <html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - グリーンピア近江八幡ゴルフ練習場</title>
    <link rel="stylesheet" href="style-ct.css">
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="X-UA-Compatible" content="グリーンピア近江八幡ゴルフ練習場" />
    <meta name="format-detection" content="グリーンピア近江八幡ゴルフ練習場">
    <link rel="shortcut icon" href="images/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c&display=swap" rel="stylesheet">
 </head>
  <title>お問い合わせフォーム</title>
  <style>body>
  <div class="container">
    <div class="header">
      <h1>お問い合わせフォーム</h1>
      <p>お気軽にお問い合わせください。3営業日以内にご返信いたします。</p>
    </div>
    
    <div class="form-container">
      <form id="contactForm">
        <div class="form-group">
          <label for="name">お名前 <span class="required">*</span></label>
          <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label for="email">メールアドレス <span class="required">*</span></label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label for="subject">件名 <span class="required">*</span></label>
          <input type="text" id="subject" name="subject" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label for="message">お問い合わせ内容 <span class="required">*</span></label>
          <textarea id="message" name="message" class="form-control" required placeholder="お問い合わせ内容をできるだけ詳しくご記入ください。"></textarea>
        </div>
        
        <button type="submit" class="btn-submit" id="submitBtn">
          送信する
        </button>
      </form>
      
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>送信中です。しばらくお待ちください...</span>
      </div>
      
      <div class="message" id="message"></div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
